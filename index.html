<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login / Signup</title>

  <!-- Bootstrap 5.3.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome (needed for your icons) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    /* Optional polish */
    input::placeholder { color:#9ca3af; font-weight:700; }
    .lift:hover { filter:brightness(.98); transform:translateY(-1px); }
    .lift:active { transform:translateY(0); }
  </style>
</head>

<body class="bg-light">

  <!-- LOGIN -->
  <section id="loginSection" class="min-vh-100 d-flex align-items-center justify-content-center bg-light px-3">
    <div class="card shadow-lg border border-warning rounded-4 p-4 p-md-5 text-center" style="max-width:520px; width:100%;">

      <!-- Icon -->
      <div class="d-flex justify-content-center mb-4">
        <div class="rounded-circle d-flex align-items-center justify-content-center"
             style="width:108px;height:108px;background:#ffd000; box-shadow:0 18px 32px rgba(255,208,0,.35);">
          <span class="fs-1 fw-bold text-dark">🔒</span>
        </div>
      </div>

      <h1 class="fw-bold mb-2 display-5 text-dark">Login</h1>

      <p class="text-secondary fw-semibold fs-5 mb-4 mx-auto" style="max-width:420px;">
        Welcome back! Please enter your details
      </p>

      <form class="text-start" onsubmit="event.preventDefault(); alert('Login clicked');">
        <!-- Email -->
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="fw-bold fs-5">Email</label>
            <a href="#" class="fw-bold text-warning text-decoration-none" onclick="event.preventDefault(); alert('Forgot clicked');">
              Forgot?
            </a>
          </div>

          <div class="d-flex align-items-center gap-3 border border-warning rounded-4 px-3 py-3" style="background:#fbf6e8;">
            <i class="fa-regular fa-envelope text-secondary fs-5"></i>
            <input
              type="email"
              class="form-control border-0 bg-transparent fw-bold fs-5 p-0 shadow-none"
              placeholder="Enter email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="fw-bold fs-5 mb-2">Password</label>
          <div class="d-flex align-items-center gap-3 border border-warning rounded-4 px-3 py-3" style="background:#fbf6e8;">
            <i class="fa-solid fa-lock text-secondary fs-5"></i>
            <input
              type="password"
              class="form-control border-0 bg-transparent fw-bold fs-5 p-0 shadow-none"
              placeholder="Enter password"
              required
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn w-100 fw-bolder fs-4 rounded-4 py-3 mt-3 lift"
          style="background:#ffd000;color:#111827; box-shadow:0 18px 32px rgba(17,24,39,.12);"
        >
          Login →
        </button>
      </form>

      <p class="mt-4 fw-bold fs-5 text-secondary text-center">
        Don’t have an account?
        <a id="openSignup" href="#" class="text-warning text-decoration-underline ms-2">Sign up</a>
      </p>

    </div>
  </section>

  <!-- SIGNUP -->
  <section id="signupSection" class="min-vh-100 d-none align-items-center justify-content-center bg-light px-3">
    <div class="card shadow-lg border border-warning rounded-4 p-4 p-md-5 text-center" style="max-width:520px; width:100%;">

      <!-- Icon -->
      <div class="d-flex justify-content-center mb-4">
        <div class="rounded-circle d-flex align-items-center justify-content-center"
             style="width:108px;height:108px;background:#ffd000; box-shadow:0 18px 32px rgba(255,208,0,.35);">
          <i class="fa-solid fa-paw fs-1 text-dark"></i>
        </div>
      </div>

      <h1 class="fw-bold display-5 mb-2 text-dark">Create Account</h1>

      <p class="text-secondary fw-semibold fs-5 mb-4 mx-auto" style="max-width:420px;">
        Register to start managing your shelter.
      </p>

      <form id="signupForm" class="text-start">
        <!-- Full Name -->
        <div class="mb-4">
          <label class="fw-bold fs-5 mb-2">Full Name</label>
          <div class="d-flex align-items-center gap-3 border border-warning rounded-4 px-3 py-3" style="background:#fbf6e8;">
            <i class="fa-regular fa-user text-secondary fs-5"></i>
            <input
              type="text"
              class="form-control border-0 bg-transparent fw-bold fs-5 p-0 shadow-none"
              placeholder="John Doe"
              required
            />
          </div>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="fw-bold fs-5 mb-2">Email Address</label>
          <div class="d-flex align-items-center gap-3 border border-warning rounded-4 px-3 py-3" style="background:#fbf6e8;">
            <i class="fa-regular fa-envelope text-secondary fs-5"></i>
            <input
              type="email"
              class="form-control border-0 bg-transparent fw-bold fs-5 p-0 shadow-none"
              placeholder="staff@pethaven.org"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="fw-bold fs-5 mb-2">Password</label>
          <div class="d-flex align-items-center gap-3 border border-warning rounded-4 px-3 py-3" style="background:#fbf6e8;">
            <i class="fa-solid fa-lock text-secondary fs-5"></i>
            <input
              id="pw"
              type="password"
              class="form-control border-0 bg-transparent fw-bold fs-5 p-0 shadow-none"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label class="fw-bold fs-5 mb-2">Confirm Password</label>
          <div class="d-flex align-items-center gap-3 border border-warning rounded-4 px-3 py-3" style="background:#fbf6e8;">
            <i class="fa-solid fa-lock text-secondary fs-5"></i>
            <input
              id="cpw"
              type="password"
              class="form-control border-0 bg-transparent fw-bold fs-5 p-0 shadow-none"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn w-100 fw-bolder fs-4 rounded-4 py-3 mt-3 d-flex align-items-center justify-content-center gap-3 lift"
          style="background:#ffd000;color:#111827; box-shadow:0 18px 32px rgba(17,24,39,.12);"
        >
          <span>Sign Up</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>

        <p class="mt-4 fw-bold fs-5 text-secondary text-center">
          Already have an account?
          <a id="openLogin" href="#" class="text-warning text-decoration-underline ms-2">Login</a>
        </p>
      </form>

    </div>
  </section>

  <script>
    const loginSection = document.getElementById("loginSection");
    const signupSection = document.getElementById("signupSection");
    const openSignup = document.getElementById("openSignup");
    const openLogin = document.getElementById("openLogin");
    const signupForm = document.getElementById("signupForm");

    function showSignup() {
      loginSection.classList.add("d-none");
      signupSection.classList.remove("d-none");
      signupSection.classList.add("d-flex");
    }

    function showLogin() {
      signupSection.classList.add("d-none");
      signupSection.classList.remove("d-flex");
      loginSection.classList.remove("d-none");
      loginSection.classList.add("d-flex");
    }

    openSignup.addEventListener("click", (e) => {
      e.preventDefault();
      showSignup();
    });

    openLogin.addEventListener("click", (e) => {
      e.preventDefault();
      showLogin();
    });

    signupForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const pw = document.getElementById("pw").value;
      const cpw = document.getElementById("cpw").value;

      if (pw !== cpw) {
        alert("Passwords do not match!");
        return;
      }

      alert("Signup successful! Please login.");
      showLogin();
    });
  </script>

</body>
</html>
