<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetHaven Registration</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<main class="min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="card shadow-lg border-0 rounded-4" style="max-width:620px;width:100%;">
    <div class="card-body p-4 p-md-5">

      <!-- ================= REGISTER (Fabasshir)================= -->
      <div class="text-center mb-4">
        <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center mx-auto shadow"
             style="width:96px;height:96px;">
          <span style="font-size:38px;">🐾</span>
        </div>
      </div>

      <h1 class="text-center fw-bold mb-2" style="font-size:3rem;">Join PetHaven</h1>
      <p class="text-center text-secondary fw-semibold mb-5 fs-4">
        Create an account to start managing your animal rescue.
      </p>

      <form action="login.html">
        <div class="mb-4">
          <label class="form-label fw-bold fs-4">Shelter Name</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text bg-white">👤</span>
            <input type="text" class="form-control" placeholder="PetHaven Central" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold fs-4">Email Address</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text bg-white">✉️</span>
            <input type="email" class="form-control" placeholder="staff@pethaven.org" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold fs-4">Password</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text bg-white">🔒</span>
            <input type="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-bold py-3 fs-3 shadow">
          Create Account <span class="ms-2">→</span>
        </button>
      </form>

      <p class="text-center mt-5 fw-semibold fs-5 mb-0">
        Already have an account?
        <a 
          href="login.html"
          class="fw-bold text-warning text-decoration-underline ms-1"
        >
          Sign in instead
        </a>
      </p>

    </div>
  </div>
</main>

</body>
</html>
